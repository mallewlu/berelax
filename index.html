<html lang="tr" data-mode="dark">

<meta charset="UTF-8">

<title>Be Relax</title>

<link rel="preload" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" as="script" crossorigin>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-dark:#080808;--bg-light:#ede9e3;
  --fg-dark:#ddd8d0;--fg-light:#1a1a1a;
  --t:.7s ease;
}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:var(--bg-dark);transition:background var(--t);font-family:'Nunito',sans-serif;}
body.auth-loading #screen-hero{opacity:0;pointer-events:none;}
html[data-mode="light"] body{background:var(--bg-light);}

/* Cursor */
@media(pointer:fine){
  body{cursor:none;}
  .cursor{
    width:8px;height:8px;border-radius:50%;
    position:fixed;pointer-events:none;z-index:9999;
    transform:translate(-50%,-50%);
    background:#fff;
    mix-blend-mode:difference;
    transition:transform .15s ease, width .15s ease, height .15s ease;
  }
  .cursor.hover{width:14px;height:14px;}
  .cursor.click{width:5px;height:5px;}
}
@media(pointer:coarse){.cursor{display:none;}}

/* Toggle */
.toggle{
  position:fixed;top:calc(2.2rem + env(safe-area-inset-top,0px));right:calc(2.2rem + env(safe-area-inset-right,0px));
  width:12px;height:12px;border-radius:50%;z-index:200;border:none;outline:none;padding:0;
  background:var(--fg-dark);transition:background var(--t),transform .25s ease;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.toggle::after{content:'';position:absolute;inset:-18px;border-radius:50%;}
@media(pointer:fine){body .toggle{cursor:none;}.toggle:hover{transform:scale(1.5);}}
html[data-mode="light"] .toggle{background:var(--fg-light);}

/* Mini header */
.mini-header{
  position:fixed;top:calc(1.6rem + env(safe-area-inset-top,0px));left:calc(1.6rem + env(safe-area-inset-left,0px));
  width:44px;height:44px;opacity:0;transition:opacity .5s ease .3s;z-index:15;pointer-events:none;
}
.mini-header.visible{opacity:1;pointer-events:auto;cursor:pointer;}
.mini-header svg{width:100%;height:100%;}
.mini-llight{display:block;}.mini-ldark{display:none;}
html[data-mode="light"] .mini-llight{display:none;}
html[data-mode="light"] .mini-ldark{display:block;}

/* Screen 1 - Hero */
#screen-hero{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  perspective:700px;
  padding:env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);
  z-index:10;transition:opacity .4s ease,transform .4s cubic-bezier(.4,0,.2,1);
}
#screen-hero.exiting{opacity:0;transform:translateY(-50px);pointer-events:none;}
#TILT,.logo-scene{width:min(520px,75vmin);height:min(520px,75vmin);}
#TILT{transform-style:preserve-3d;will-change:transform;}
.logo-scene{opacity:0;animation:rise 1.4s cubic-bezier(.16,1,.3,1) .1s forwards;}
.logo-scene svg,.logo-inner{width:100%;height:100%;display:block;}
.logo-light{display:block;}.logo-dark{display:none;}
html[data-mode="light"] .logo-light{display:none;}
html[data-mode="light"] .logo-dark{display:block;}
@keyframes rise{from{opacity:0;transform:scale(.93) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}
#heart,#heart2{transform-origin:center;transform-box:fill-box;animation:heartbeat 4s ease-in-out 1.2s infinite;}
@keyframes heartbeat{0%,100%{transform:scale(1);}50%{transform:scale(0.94);}}
.swipe-hint{
  position:fixed;bottom:calc(2.2rem + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);
  color:var(--fg-dark);opacity:.3;font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  pointer-events:none;animation:hint-pulse 3s ease-in-out 3s infinite;z-index:10;
}
html[data-mode="light"] .swipe-hint{color:var(--fg-light);}
@keyframes hint-pulse{0%,100%{opacity:.3;}50%{opacity:.55;}}

/* Screen 2 - Pet */
#screen-pet{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:5;opacity:0;visibility:hidden;pointer-events:none;
  will-change:opacity;
  content-visibility:auto;
  transition:opacity .3s ease,visibility 0s .35s;
  padding:calc(4rem + env(safe-area-inset-top,0px)) 0 calc(1rem + env(safe-area-inset-bottom,0px));
}
#screen-pet.visible{opacity:1;visibility:visible;pointer-events:all;transition:opacity .3s ease .1s,visibility 0s;}

.back-hint{
  position:fixed;top:calc(2rem + env(safe-area-inset-top,0px));left:calc(1.6rem + env(safe-area-inset-left,0px));
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--fg-dark);opacity:.15;cursor:pointer;transition:opacity .2s,color var(--t);
  -webkit-tap-highlight-color:transparent;z-index:15;
}
html[data-mode="light"] .back-hint{color:var(--fg-light);}
.back-hint:hover{opacity:.45;}

/* Pet character */
.pet-scene{position:relative;display:inline-flex;align-items:flex-start;justify-content:center;flex-shrink:0;overflow:visible;}
.pet-wrap{width:150px;height:150px;display:flex;align-items:center;justify-content:center;overflow:visible;}

/* Pet bubble */
.pet-bubble{
  position:absolute;
  bottom:calc(100% - 10px);
  width:max-content;
  max-width:min(180px,55vw);
  min-width:40px;
  padding:8px 14px;
  border-radius:18px;
  background:var(--fg-dark);color:var(--bg-dark);
  font-size:13px;line-height:1.5;
  white-space:normal;word-break:break-word;
  text-align:left;
  opacity:0;
  transition:opacity .3s ease,transform .3s ease,background var(--t),color var(--t);
  z-index:25;pointer-events:none;
}
/* Sola yakın → sağ üstten çıkar, sivri sol altta */
.pet-bubble.side-right{
  left:calc(100% - 14px);
  border-bottom-left-radius:3px;
  transform:scale(0.9) translate(-4px,4px);
}
.pet-bubble.side-right.visible{transform:scale(1) translate(0,0);}
/* Sağa yakın → sol üstten çıkar, sivri sağ altta */
.pet-bubble.side-left{
  right:calc(100% - 14px);
  border-bottom-right-radius:3px;
  transform:scale(0.9) translate(4px,4px);
}
.pet-bubble.side-left.visible{transform:scale(1) translate(0,0);}
html[data-mode="light"] .pet-bubble{background:var(--fg-light);color:var(--bg-light);}
.pet-bubble.thinking{opacity:.3;}

/* Hunger indicator */
#HUNGER_IND{
  position:fixed;bottom:calc(2rem + env(safe-area-inset-bottom,0px));left:calc(1.6rem + env(safe-area-inset-left,0px));
  z-index:20;width:64px;height:64px;
}

/* Message history */
.msg-history{
  display:flex;flex-direction:column;align-items:flex-end;gap:6px;
  position:fixed;bottom:calc(5rem + env(safe-area-inset-bottom,0px));right:calc(1.6rem + env(safe-area-inset-right,0px));
  max-width:min(200px,55vw);z-index:19;pointer-events:none;
}
.msg-item{
  background:var(--fg-dark);color:var(--bg-dark);
  font-size:13px;line-height:1.4;padding:7px 12px;
  border-radius:16px;border-bottom-right-radius:3px;
  opacity:0;transform:translateY(5px) scale(0.95);
  transition:opacity .25s ease,transform .25s ease;word-break:break-word;text-align:right;
}
html[data-mode="light"] .msg-item{background:var(--fg-light);color:var(--bg-light);}
.msg-item.visible{opacity:1;transform:translateY(0) scale(1);}
.msg-item.fading{opacity:.15;transform:translateY(-4px);}

/* User bubble */
.user-bubble-wrap{
  position:fixed;bottom:calc(2rem + env(safe-area-inset-bottom,0px));right:calc(1.6rem + env(safe-area-inset-right,0px));
  z-index:20;
  transition:bottom 0s; /* JS override eder, transition olmasın */
}
.user-bubble{
  background:var(--fg-dark);color:var(--bg-dark);
  border-radius:20px;border-bottom-right-radius:3px;
  padding:10px 14px;font-size:14px;
  cursor:pointer;
  transition:all .3s cubic-bezier(.34,1.56,.64,1),background var(--t),color var(--t);
  white-space:nowrap;overflow:hidden;min-width:44px;text-align:center;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
html[data-mode="light"] .user-bubble{background:var(--fg-light);color:var(--bg-light);}
.user-bubble .dots{display:flex;gap:3px;align-items:center;justify-content:center;}
.user-bubble .dots span{width:4px;height:4px;border-radius:50%;background:var(--bg-dark);transition:background var(--t);}
html[data-mode="light"] .user-bubble .dots span{background:var(--bg-light);}
.user-bubble.open{border-radius:20px;border-bottom-right-radius:3px;padding:10px 14px;min-width:min(200px,60vw);max-width:min(260px,78vw);cursor:text;}
.user-bubble.open .dots{display:none;}
.user-bubble.open .bubble-input{display:block;}
.bubble-input{display:none;background:transparent;border:none;outline:none;font-family:'Nunito',sans-serif;font-size:16px;color:var(--bg-dark);width:100%;caret-color:var(--bg-dark);}
html[data-mode="light"] .bubble-input{color:var(--bg-light);caret-color:var(--bg-light);}
.bubble-input::placeholder{opacity:.32;font-size:13px;}
.user-bubble.emoji-mode{border-radius:50%;padding:0;min-width:52px;max-width:52px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;cursor:text;}
.user-bubble.emoji-mode .dots{display:none;}
.user-bubble.emoji-mode .bubble-input{display:flex;align-items:center;justify-content:center;font-size:26px;width:auto;text-align:center;}


/* Drop emoji */
.drop-emoji{position:fixed;pointer-events:none;z-index:18;font-size:42px;line-height:1;transform:translate(-50%,-50%) scale(0);transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s ease;opacity:0;user-select:none;}
.drop-emoji.appear{transform:translate(-50%,-50%) scale(1);opacity:1;}
.drop-emoji.collect{transform:translate(-50%,-50%) scale(0);opacity:0;}

@media(prefers-reduced-motion:reduce){.logo-scene{animation:none;opacity:1;}#heart,#heart2{animation:none;}}

/* ── Birth animation ── */
@keyframes pet-birth{
  0%  {transform:translate(var(--px),var(--py)) scale(0)    rotate(-8deg); opacity:0;}
  55% {transform:translate(var(--px),var(--py)) scale(1.18) rotate(4deg);  opacity:1;}
  75% {transform:translate(var(--px),var(--py)) scale(0.92) rotate(-2deg); opacity:1;}
  90% {transform:translate(var(--px),var(--py)) scale(1.05) rotate(1deg);  opacity:1;}
  100%{transform:translate(var(--px),var(--py)) scale(1)    rotate(0deg);  opacity:1;}
}
.pet-scene.birthing{
  animation:pet-birth .9s cubic-bezier(.34,1.56,.64,1) forwards;
}
/* ── Auth Screen ── */
#screen-auth{
  position:fixed;inset:0;z-index:30;
  display:flex;align-items:center;justify-content:center;
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity .3s ease,visibility 0s .35s;
  padding:env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);
}
#screen-auth.visible{opacity:1;visibility:visible;pointer-events:all;transition:opacity .3s ease,visibility 0s;}
.auth-card{
  background:var(--fg-dark);color:var(--bg-dark);
  border-radius:28px;padding:40px 36px 36px;
  width:min(340px,88vw);
  display:flex;flex-direction:column;align-items:center;gap:20px;
  box-shadow:0 32px 80px rgba(0,0,0,.45);
  transition:background var(--t),color var(--t);
}
html[data-mode="light"] .auth-card{background:var(--fg-light);color:var(--bg-light);box-shadow:0 32px 80px rgba(0,0,0,.18);}
.auth-logo{width:48px;height:48px;opacity:.9;}
.auth-title{font-size:18px;font-weight:500;letter-spacing:.02em;opacity:.9;text-align:center;line-height:1.3;}
.auth-sub{font-size:12px;opacity:.4;letter-spacing:.08em;text-transform:uppercase;text-align:center;}
.auth-google-btn{
  width:100%;padding:13px 20px;border-radius:16px;border:none;outline:none;
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--bg-dark);color:var(--fg-dark);
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:500;letter-spacing:.01em;
  cursor:pointer;
  transition:background var(--t),color var(--t),transform .2s ease,opacity .2s;
  -webkit-tap-highlight-color:transparent;
}
html[data-mode="light"] .auth-google-btn{background:var(--bg-light);color:var(--fg-light);}
.auth-google-btn:hover{opacity:.85;transform:scale(1.02);}
.auth-google-btn:active{transform:scale(.98);}
.auth-google-btn svg{flex-shrink:0;}
.auth-error{font-size:12px;color:#ef4444;text-align:center;min-height:16px;opacity:.9;}
.auth-back{font-size:11px;opacity:.3;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;-webkit-tap-highlight-color:transparent;}
.auth-back:hover{opacity:.6;}

</style>
</head>
<body>
<div class="cursor" id="CUR"></div>
<button class="toggle" id="TOGGLE" aria-label="Toggle mode"></button>

  /* ── Colors ── */

    const d=mode==='dark',fill=d?'#ddd8d0':'#1a1a1a',eye=d?'#080808':'#ede9e3';
    ['pw1','pw2','ph1','ph2','pb'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.fill=fill;});
    ['pel','per'].forEach(id=>{const el=document.getElementById(id);if(el){el.style.fill=eye;el.setAttribute('fill',eye);}});
    ['pf1','pf2','pf3','pf4','pf5','pf6'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.stroke=eye;});
  }
  updatePetColors(html.getAttribute('data-mode'));

  toggle.addEventListener('click',()=>{
    const m=html.getAttribute('data-mode')==='dark'?'light':'dark';
    html.setAttribute('data-mode',m);updatePetColors(m);
  });

  /* ── Cursor ── */
  if(!isTouch){
    document.addEventListener('mousemove',e=>{
      cur.style.left=e.clientX+'px';
      cur.style.top=e.clientY+'px';
      mx=e.clientX;my=e.clientY;
    });
    document.addEventListener('mousedown',()=>cur.classList.add('click'));
    document.addEventListener('mouseup',()=>cur.classList.remove('click'));

    // Hover enlarge on interactive elements
    const hoverEls='a,button,input,[role="button"],[style*="cursor:pointer"],[style*="cursor: pointer"]';
    document.addEventListener('mouseover',e=>{
      if(e.target.closest(hoverEls))cur.classList.add('hover');
    });
    document.addEventListener('mouseout',e=>{
      if(e.target.closest(hoverEls))cur.classList.remove('hover');
    });
  }

  /* ── Gyro ── */
  let gyroActive=false,gx=0,gy=0,baseGamma=null,baseBeta=null,fgx=0,fgy=0;
  function onOrientation(e){
    if(e.gamma==null||e.beta==null)return;
    if(baseGamma===null){baseGamma=e.gamma;baseBeta=e.beta;}
    const dg=Math.max(-25,Math.min(25,e.gamma-baseGamma)),db=Math.max(-25,Math.min(25,e.beta-baseBeta));
    fgx+=(dg/25-fgx)*0.18;fgy+=(db/25-fgy)*0.18;gx=fgx;gy=fgy;gyroActive=true;
  }
  function bindGyro(){window.addEventListener('deviceorientation',onOrientation,true);}
  if(typeof DeviceOrientationEvent!=='undefined'){
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      document.addEventListener('touchend',function ask(){DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')bindGyro();}).catch(()=>{});document.removeEventListener('touchend',ask);},{once:true,passive:true});
    } else bindGyro();
  }

  /* ── Swipe ── */
  let sy0=null,sx0=null,st0=null,swipeLocked=false;
  document.addEventListener('touchstart',e=>{
    if(!onPetScreen&&!gyroActive){mx=e.touches[0].clientX;my=e.touches[0].clientY;}
    // Only track swipe on hero screen, not on pet screen elements
    if(!onPetScreen){
      sy0=e.touches[0].clientY;sx0=e.touches[0].clientX;st0=Date.now();swipeLocked=false;
    }
  },{passive:true});
  document.addEventListener('touchmove',e=>{
    if(sy0===null)return;
    const dy=sy0-e.touches[0].clientY;
    const dx=Math.abs(sx0-e.touches[0].clientX);
    // If moving more horizontal than vertical, cancel swipe
    if(dx>dy&&dx>15)swipeLocked=true;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(sy0===null||swipeLocked)return;
    const dy=sy0-e.changedTouches[0].clientY;
    const dx=Math.abs(sx0-e.changedTouches[0].clientX);
    const dt=Math.max(Date.now()-st0,1);
    const velocity=dy/dt;
    // Swipe up: clear vertical gesture, no drag conflict
    const isSwipeUp=(dy>50&&dx<70)||(velocity>0.4&&dy>25&&dx<70);
    if(isSwipeUp&&!onPetScreen){
      showAuth();
    }
    sy0=null;st0=null;swipeLocked=false;
  },{passive:true});
  let wlock=false;
  document.addEventListener('wheel',e=>{
    if(wlock)return;
    if(e.deltaY>30&&!onPetScreen){if(window._goToPetGated)window._goToPetGated();else goToPet();wlock=true;setTimeout(()=>wlock=false,800);}
    if(e.deltaY<-30&&onPetScreen){goToHero();wlock=true;setTimeout(()=>wlock=false,800);}
  },{passive:true});

  /* ── Pet UI visibility helpers ── */
  function setPetUIVisible(v){
    ['HUNGER_IND','MSG_HISTORY'].forEach(id=>{
      const el=document.getElementById(id);if(el)el.style.visibility=v?'visible':'hidden';
    });
    const ubw=document.querySelector('.user-bubble-wrap');if(ubw)ubw.style.visibility=v?'visible':'hidden';
  }
  setPetUIVisible(false);

  let isNewUser=false;

  function goToPet(){
    onPetScreen=true;
    heroScreen.classList.add('exiting');
    setTimeout(()=>heroScreen.style.display='none',420);
    petScreen.classList.add('visible');
    miniHeader.classList.add('visible');
    setPetUIVisible(true);
    setTimeout(()=>applyHungerState(),50);

    if(isNewUser){
      isNewUser=false;
      // Birth animation
      const scene=document.querySelector('.pet-scene');
      if(scene){
        scene.style.setProperty('--px', petX.toFixed(2)+'px');
        scene.style.setProperty('--py', petY.toFixed(2)+'px');
        scene.classList.add('birthing');
        scene.addEventListener('animationend',()=>{
          scene.classList.remove('birthing');
        },{once:true});
      }
      // First word after short delay
      const ch=CHARACTERS[currentCharacter]||CHARACTERS.masum;
      setTimeout(()=>showPet(ch.firstWord||'...'),700);
    } else {
      const s=getHungerState();
      if(s==='sleeping')showPet('💤');
      else if(s==='very-hungry')showPet('açım');
      else showPet('...');
    }
  }
  function goToHero(){
    onPetScreen=false;
    heroScreen.style.display='';
    requestAnimationFrame(()=>requestAnimationFrame(()=>heroScreen.classList.remove('exiting')));
    petScreen.classList.remove('visible');
    miniHeader.classList.remove('visible');
    setPetUIVisible(false);
    closeBubble();
    petTX=0;petTY=0;petMode='idle';
    // Ekranda kalan emoji varsa temizle
    if(droppedEmoji){droppedEmoji.el.remove();droppedEmoji=null;}
    collecting=false;
  }
  document.getElementById('MINI').addEventListener('click', goToHero);
  document.addEventListener('click',e=>{
    if(!bubbleOpen)return;
    if(userBubble.contains(e.target))return;
    if(onPetScreen&&userBubble.classList.contains('emoji-mode')){
      const emoji=feedInput.value.trim();
      const sz=parseInt(feedInput.style.fontSize)||26;
      dropEmojiAt(e.clientX,e.clientY,emoji,Math.round(sz*1.6));
      closeBubble();

    if(!bubbleOpen)return;
    bubbleOpen=false;
    userBubble.classList.remove('open','emoji-mode');

    petBubble.classList.remove('visible','thinking','side-right','side-left');

        setTimeout(()=>{petBubble.classList.remove('visible','side-right','side-left');petBubble.style.opacity='';},400);
      },5000);

    const el=document.createElement('div');

  function tryEmoji(t){
    const k=t.toLowerCase().trim();
    if(emojiMap[k])return emojiMap[k];
    const norm=k.replace(/ç/g,'c').replace(/ğ/g,'g').replace(/ı/g,'i').replace(/ö/g,'o').replace(/ş/g,'s').replace(/ü/g,'u');
    return emojiMap[norm]||null;
  }
  function isEmojiOnly(s){return s.length<=4&&/^\p{Emoji}/u.test(s);}

  const sizeModifiers=['büyük','dev','mega','kocaman','giant','huge','küçük','mini','ufak','minik','tiny','çok','super','ultra'];
  function getSizeMult(raw){
    const l=raw.toLowerCase();
    if(['büyük','dev','mega','kocaman','giant','huge'].some(w=>l.includes(w)))return 1.7;
    if(['küçük','mini','ufak','minik','tiny'].some(w=>l.includes(w)))return 0.6;
    if(['çok','super','ultra'].some(w=>l.includes(w)))return 1.3;
    return 1;
  }

  function checkEmojiConvert(){
    const raw=feedInput.value.trim();
    const parts=raw.split(' ');
    let found=null;
    if(parts.length<=2){
      const nonSize=parts.filter(p=>!sizeModifiers.includes(p.toLowerCase()));
      if(nonSize.length===1)found=tryEmoji(nonSize[0]);
    }
    if(found){
      const m=getSizeMult(raw);
      const sz=Math.round(26*m),bx=Math.round(52*m);
      feedInput.value=found;feedInput.dataset.sizeMult=m;
      feedInput.style.fontSize=sz+'px';
      userBubble.style.width=bx+'px';userBubble.style.height=bx+'px';userBubble.style.minWidth=bx+'px';
      userBubble.classList.add('emoji-mode');userBubble.classList.remove('open');

  const MARGIN_LR  = 10;   // yanlarda minimum boşluk

  function clampPetPos(x,y){
    const hw=petScene.offsetWidth/2||70,hh=petScene.offsetHeight/2||70;
    return [
      Math.max(MARGIN_LR+hw, Math.min(W-MARGIN_LR-hw, x)),
      Math.max(MARGIN_TOP+hh, Math.min(H-MARGIN_BOT-hh, y))

  /* ── Render loop ── */
  function lerp(a,b,t){return a+(b-a)*t;}
  const MAX_TILT=13,SPD=0.06;

  (function tick(){
    if(!onPetScreen){
      let tx,ty;
      if(gyroActive){tx=-gx*MAX_TILT;ty=gy*MAX_TILT;}
      else{tx=((mx-W/2)/(W/2))*MAX_TILT;ty=-((my-H/2)/(H/2))*MAX_TILT;}
      rx=lerp(rx,ty,gyroActive?0.10:SPD);ry=lerp(ry,tx,gyroActive?0.10:SPD);
      tilt.style.transform='rotateX('+rx.toFixed(3)+'deg) rotateY('+ry.toFixed(3)+'deg)';

      const spd=petMode==='drag'?0.22:petMode==='collect'?COLLECT:petMode==='bored'?BORED:DRIFT;

        if(dist<80){

          // Mıknatıs: emojiye doğru çek, mesafe azaldıkça güçlenir

          if(dist<magnetDist){

            const tx=droppedEmoji.x+dx*0.15*pull;

        }

  supa.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_IN'||event==='TOKEN_REFRESHED'){
      handleSession(session);
    }
    if(event==='SIGNED_OUT'){
      onPetScreen=false;
      petScreen.classList.remove('visible');
      miniHeader.classList.remove('visible');
      heroScreen.style.display='';
      heroScreen.classList.remove('exiting');
      document.body.classList.remove('auth-loading');
    }
  });

  // Logout function
  window.doSignOut=async function(){
    await supa.auth.signOut();
    currentUser=null;
    try{localStorage.removeItem(KEY);}catch{}
  };

  // Hero screen click/tap → show auth
  heroScreen.addEventListener('click',e=>{
    if(e.target.closest('#TOGGLE'))return;
    showAuth();
  });

  window._goToPetGated=function(){
    showAuth();
  };

  /* ── Dev bypass (Shift+D) ── */
  document.addEventListener('keydown',e=>{
    if(e.shiftKey&&e.key==='D'){
      currentCharacter=CHAR_KEYS[Math.floor(Math.random()*CHAR_KEYS.length)];
      applyCharacterEyes(currentCharacter);
      authScreen.classList.remove('visible');
      heroScreen.style.display='';
      heroScreen.classList.remove('exiting');
      isNewUser=true;
      goToPet();
    }
  });

  window.addEventListener('resize',()=>{W=window.innerWidth;H=window.innerHeight;});

  /* ── Input klavyenin üstünde kalsın (iOS/Android) ── */
  const ubw=document.querySelector('.user-bubble-wrap');
  const BMARG=12;

  function repositionBubble(){
    if(!window.visualViewport||!ubw)return;
    const vv=window.visualViewport;
    const keyboardH=window.innerHeight-(vv.offsetTop+vv.height);
    if(keyboardH>50){
      // Klavye açık: bubble'ı klavyenin tam üstüne taşı
      ubw.style.bottom=(keyboardH+BMARG)+'px';
    } else {
      // Klavye kapalı: CSS'e bırak
      ubw.style.bottom='';
    }
  }

  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',repositionBubble);
    window.visualViewport.addEventListener('scroll',repositionBubble);
  }

})();
}); // DOMContentLoaded
</script>
</body>
</html>
