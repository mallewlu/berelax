<!DOCTYPE html>
<html lang="tr" data-mode="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Be Relax</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg-dark:#080808;
  --bg-light:#ede9e3;
  --fg-dark:#ddd8d0;
  --fg-light:#1a1a1a;
  --t:.7s ease;
}

html,body{width:100%;height:100%;overflow:hidden;}
body{background:var(--bg-dark);transition:background var(--t);}
html[data-mode="light"] body{background:var(--bg-light);}

@media (pointer:fine){
  body{cursor:none;}
  .cursor{
    width:5px;height:5px;border-radius:50%;
    position:fixed;pointer-events:none;z-index:9999;
    transform:translate(-50%,-50%);
    background:var(--fg-dark);
    transition:background var(--t);
  }
  html[data-mode="light"] .cursor{background:var(--fg-light);}
}
@media (pointer:coarse){.cursor{display:none;}}

.toggle{
  position:fixed;
  top:calc(2.5rem + env(safe-area-inset-top,0px));
  right:calc(3rem + env(safe-area-inset-right,0px));
  width:14px;height:14px;border-radius:50%;
  z-index:200;border:none;outline:none;padding:0;
  background:var(--fg-dark);
  transition:background var(--t),transform .25s ease;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.toggle::after{content:'';position:absolute;inset:-20px;border-radius:50%;}
@media (pointer:fine){body .toggle{cursor:none;}.toggle:hover{transform:scale(1.5);}}
html[data-mode="light"] .toggle{background:var(--fg-light);}
@media (max-width:480px){
  .toggle{
    top:calc(1.4rem + env(safe-area-inset-top,0px));
    right:calc(1.4rem + env(safe-area-inset-right,0px));
    width:16px;height:16px;
  }
}

.hero{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  perspective:700px;
  padding:env(safe-area-inset-top,0px) env(safe-area-inset-right,0px) env(safe-area-inset-bottom,0px) env(safe-area-inset-left,0px);
}

#TILT,.logo-scene{width:min(520px,75vmin);height:min(520px,75vmin);}
#TILT{transform-style:preserve-3d;will-change:transform;}
.logo-scene{opacity:0;animation:rise 2s cubic-bezier(.16,1,.3,1) .4s forwards;}
.logo-scene svg{width:100%;height:100%;display:block;}
.logo-inner{width:100%;height:100%;}

.logo-light{display:block;}
.logo-dark{display:none;}
html[data-mode="light"] .logo-light{display:none;}
html[data-mode="light"] .logo-dark{display:block;}

@keyframes rise{
  from{opacity:0;transform:scale(.93) translateY(18px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

#heart,#heart2{
  transform-origin:center;transform-box:fill-box;
  animation:heartbeat 4s ease-in-out 2.5s infinite;
}
@keyframes heartbeat{
  0%,100%{transform:scale(1);}
  14%{transform:scale(1.08);}
  28%{transform:scale(0.97);}
  42%{transform:scale(1.05);}
  70%{transform:scale(1);}
}

@media (prefers-reduced-motion:reduce){
  .logo-scene{animation:none;opacity:1;}
  #heart,#heart2{animation:none;}
}
</style>
</head>

<script>
(function(){
  const cur    = document.getElementById('CUR');
  const toggle = document.getElementById('TOGGLE');
  const tilt   = document.getElementById('TILT');
  const html   = document.documentElement;

  let W = window.innerWidth, H = window.innerHeight;
  let mx = W/2, my = H/2;
  let rx = 0, ry = 0;
  const isTouch = window.matchMedia('(pointer:coarse)').matches;

  if (!isTouch) {
    document.addEventListener('mousemove', e => {
      cur.style.left = e.clientX + 'px';
      cur.style.top  = e.clientY + 'px';
      mx = e.clientX; my = e.clientY;
    });
  }

  let useOrientation = false, oGamma = 0, oBeta = 0;
  function enableOrientation() {
    window.addEventListener('deviceorientation', e => {
      if (e.beta == null || e.gamma == null) return;
      useOrientation = true;
      oBeta  = Math.max(-30, Math.min(30, e.beta  - 45));
      oGamma = Math.max(-30, Math.min(30, e.gamma));
    });
  }
  if (isTouch && window.DeviceOrientationEvent) {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      document.addEventListener('touchstart', function req() {
        DeviceOrientationEvent.requestPermission()
          .then(s => { if (s === 'granted') enableOrientation(); })
          .catch(()=>{});
        document.removeEventListener('touchstart', req);
      }, { once: true });
    } else { enableOrientation(); }
  }

  document.addEventListener('touchmove', e => {
    if (!useOrientation) { mx = e.touches[0].clientX; my = e.touches[0].clientY; }
  }, { passive: true });
  document.addEventListener('touchstart', e => {
    if (!useOrientation) { mx = e.touches[0].clientX; my = e.touches[0].clientY; }
  }, { passive: true });

  toggle.addEventListener('click', () => {
    html.setAttribute('data-mode', html.getAttribute('data-mode') === 'dark' ? 'light' : 'dark');
  });

  function lerp(a, b, t) { return a + (b - a) * t; }
  const MAX_TILT = isTouch ? 8 : 11;
  const LERP_SPD = isTouch ? 0.055 : 0.08;

  (function tick() {
    let tx, ty;
    if (isTouch && useOrientation) {
      tx =  (oGamma / 30) * MAX_TILT;
      ty = -(oBeta  / 30) * MAX_TILT;
    } else {
      tx =  ((mx - W/2) / (W/2)) * MAX_TILT;
      ty = -((my - H/2) / (H/2)) * MAX_TILT;
    }
    rx = lerp(rx, ty, LERP_SPD);
    ry = lerp(ry, tx, LERP_SPD);
    tilt.style.transform = `rotateX(${rx.toFixed(3)}deg) rotateY(${ry.toFixed(3)}deg)`;
    requestAnimationFrame(tick);
  })();

  window.addEventListener('resize', () => { W = window.innerWidth; H = window.innerHeight; });
})();
</script>
